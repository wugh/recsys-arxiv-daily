# TODO: add papers by configuration file
base_url: "https://arxiv.paperswithcode.com/api/v0/papers/"
user_name: "Vincentqyw"
repo_name: "cv-arxiv-daily"
show_authors: True
show_links: True
show_badge: True
max_results: 10

publish_readme: True
publish_gitpage: True
publish_wechat: False

# file paths
json_readme_path: './docs/cv-arxiv-daily.json'
json_gitpage_path: './docs/cv-arxiv-daily-web.json'
json_wechat_path: './docs/cv-arxiv-daily-wechat.json'

md_readme_path: 'README.md'
md_gitpage_path: './docs/index.md'
md_wechat_path: './docs/wechat.md'
logging_path: 'run.log'
update_code_link_num: 200

# keywords to search
keywords:
  "Recsys":
    description: "推荐系统"
    # categories 的顺序代表优先级（高 -> 低）：先用 cs.IR 检索，再依次用 cs.LG / cs.CL / cs.AI 补足
    categories:
      - cs.IR
      - cs.LG
      - cs.CL
      - cs.AI
    query: >
      (
        ti:"recommendation system" OR abs:"recommendation system"
        OR ti:"recommender system" OR abs:"recommender system"
        OR ti:"recommendation" OR abs:"recommendation"
        OR ti:"recsys" OR abs:"recsys"
        OR ti:"collaborative filtering" OR abs:"collaborative filtering"
        OR ti:"matrix factorization" OR abs:"matrix factorization"
        OR ti:"sequential recommendation" OR abs:"sequential recommendation"
        OR ti:"session-based recommendation" OR abs:"session-based recommendation"
        OR ti:"click-through rate" OR abs:"click-through rate"
        OR ti:"CTR prediction" OR abs:"CTR prediction"
        OR ti:"conversion rate prediction" OR abs:"conversion rate prediction"
        OR ti:"CVR prediction" OR abs:"CVR prediction"
        OR ti:"user engagement" OR abs:"user engagement"
        OR ti:"engagement prediction" OR abs:"engagement prediction"
        OR ti:"user behavior modeling" OR abs:"user behavior modeling"
        OR ti:"user interest" OR abs:"user interest"
        OR ti:"user modeling" OR abs:"user modeling"
        OR ti:"personalization" OR abs:"personalization"
        OR ti:"personalized ranking" OR abs:"personalized ranking"
        OR ti:"learning to rank" OR abs:"learning to rank"
        OR ti:"ranking model" OR abs:"ranking model"
        OR ti:"retrieval and ranking" OR abs:"retrieval and ranking"
        OR ti:"candidate generation" OR abs:"candidate generation"
        OR ti:"feature interaction" OR abs:"feature interaction"
        OR ti:"advertising system" OR abs:"advertising system"
        OR ti:"computational advertising" OR abs:"computational advertising"
        OR ti:"online advertising" OR abs:"online advertising"
        OR abs:"advertising"
        OR ti:"search engine" OR abs:"search engine"
        OR ti:"sponsored search" OR abs:"sponsored search"
        OR ti:"cold start" OR abs:"cold-start recommendation"
      )
    max_results: 20
    sort_by: "submitted_date"
    sort_order: "descending"

  "Recsys LLM":
    description: "推荐系统&大模型"
    # 优先级顺序：cs.IR > cs.LG > cs.CL > cs.AI
    categories:
      - cs.IR
      - cs.LG
      - cs.CL
      - cs.AI
    query: >
      (
        ti:"recommendation system" OR abs:"recommendation system"
        OR ti:"recommender system" OR abs:"recommender system"
        OR ti:"recommendation" OR abs:"recommendation"
        OR ti:"recsys" OR abs:"recsys"
        OR ti:"collaborative filtering" OR abs:"collaborative filtering"
        OR ti:"sequential recommendation" OR abs:"sequential recommendation"
        OR ti:"click-through rate" OR abs:"click-through rate"
        OR ti:"CTR prediction" OR abs:"CTR prediction"
        OR ti:"user engagement" OR abs:"user engagement"
        OR ti:"user behavior modeling" OR abs:"user behavior modeling"
        OR ti:"personalization" OR abs:"personalization"
        OR ti:"learning to rank" OR abs:"learning to rank"
        OR ti:"advertising system" OR abs:"advertising system"
        OR abs:"advertising"
        OR ti:"search engine" OR abs:"search engine"
      )
      AND
      (ti:"large language model" OR abs:"large language model" OR ti:LLM OR abs:LLM OR ti:"language model" OR abs:"language model")
    max_results: 20
    sort_by: "submitted_date"
    sort_order: "descending"
  
  "LLM":
    description: "大模型论文"
    categories:
      - cs.CL
      - cs.IR
      - cs.LG
      - cs.AI
    query: >
      (ti:"large language model" OR abs:"large language model" OR ti:LLM OR abs:LLM OR ti:"language model" OR abs:"language model")
      AND
      (abs:"chatgpt" OR abs:"openai" OR abs:"gpt" OR abs:"claude" OR abs:"gemini" OR abs:"llama" OR abs:"mistral" OR abs:"deepseek" OR abs:"moonshot" OR abs:"kimi" OR abs:"internlm" OR abs:"qwen" OR abs:"baichuan" OR abs:"glm" OR abs:"pangu" OR abs:"minimax" OR abs:"minimaxgpt" OR abs:"doubao" OR abs:"bytedance" OR abs:"google" OR abs:"apple" OR abs:"deepmind")
    max_results: 30
    sort_by: "submitted_date"
    sort_order: "descending"
  
